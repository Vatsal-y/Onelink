<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <rect width="900" height="600" rx="15" fill="#0b0f19"/>
  <defs>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">SnapLink — Cache-Aside &amp; Redirect Flow</text>
  <text x="450" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Request Lifecycle for GET /{shortCode}</text>

  <!-- Entry -->
  <g transform="translate(350, 110)">
    <rect width="200" height="50" rx="25" fill="url(#blue-grad)" filter="url(#shadow)"/>
    <text x="100" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">GET /{shortCode} Request</text>
  </g>

  <!-- Step 1: Redis Check -->
  <g transform="translate(350, 200)">
    <rect width="200" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Step 1: Check Redis Cache</text>
    <text x="100" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Key: short:{shortCode}</text>
  </g>

  <!-- Decision 1: Cache Hit? -->
  <g transform="translate(450, 310)">
    <!-- Rhombus/Diamond for decision -->
    <path d="M 0 -40 L 70 0 L 0 40 L -70 0 Z" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Cache Hit?</text>
  </g>

  <!-- Cache Hit Path: Redirect 301 -->
  <g transform="translate(620, 290)">
    <rect width="200" height="80" rx="8" fill="#064e3b" stroke="#047857" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#34d399" text-anchor="middle">HTTP 301 Permanent Redirect</text>
    <text x="100" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a7f3d0" text-anchor="middle">Return long URL destination</text>
    <text x="100" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Execution Time: &lt; 10ms</text>
  </g>

  <!-- Cache Miss Path: Query DynamoDB -->
  <g transform="translate(100, 290)">
    <rect width="200" height="80" rx="8" fill="#1e293b" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="100" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#818cf8" text-anchor="middle">Step 2: Query DynamoDB</text>
    <text x="100" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Query: FindByShortCode()</text>
    <text x="100" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#a5b4fc" text-anchor="middle">Execution Time: ~50ms</text>
  </g>

  <!-- Decision 2: Link Exists? -->
  <g transform="translate(200, 430)">
    <path d="M 0 -35 L 70 0 L 0 35 L -70 0 Z" fill="#1e293b" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Exists?</text>
  </g>

  <!-- Not Exists: HTTP 404 -->
  <g transform="translate(40, 500)">
    <rect width="130" height="60" rx="8" fill="#7f1d1d" stroke="#b91c1c" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="65" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#fca5a5" text-anchor="middle">HTTP 404</text>
    <text x="65" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle">Link Not Found</text>
  </g>

  <!-- Decision 3: Expiry validation -->
  <g transform="translate(360, 430)">
    <path d="M 0 -35 L 70 0 L 0 35 L -70 0 Z" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Expired?</text>
  </g>

  <!-- Expired: HTTP 410 Gone -->
  <g transform="translate(300, 500)">
    <rect width="120" height="60" rx="8" fill="#7f1d1d" stroke="#b91c1c" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#fca5a5" text-anchor="middle">HTTP 410</text>
    <text x="60" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle">Link Expired</text>
  </g>

  <!-- Exists & Active: Cache update & Redirect -->
  <g transform="translate(540, 420)">
    <rect width="280" height="140" rx="8" fill="#064e3b" stroke="#047857" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="140" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#34d399" text-anchor="middle">Step 3: Update Redis Cache</text>
    <text x="140" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a7f3d0" text-anchor="middle">redisTemplate.set(key, longUrl, 1h)</text>
    
    <line x1="20" y1="70" x2="260" y2="70" stroke="#047857" stroke-width="1"/>
    
    <text x="140" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#34d399" text-anchor="middle">Step 4: HTTP 301 Redirect</text>
    <text x="140" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a7f3d0" text-anchor="middle">Redirect to destination URL</text>
  </g>

  <!-- Connectors -->
  <!-- Entry to Cache check -->
  <path d="M 450 160 L 450 192" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Cache check to Decision -->
  <path d="M 450 260 L 450 268" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Decision to Hit -->
  <path d="M 520 310 L 612 310" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="560" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#34d399">Yes</text>

  <!-- Decision to Miss -->
  <path d="M 380 310 L 308 310" stroke="#f87171" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="340" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#f87171">No</text>

  <!-- Miss to Exist Check -->
  <path d="M 200 370 L 200 392" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Exist to Yes/No -->
  <!-- No Exist -->
  <path d="M 130 430 L 105 430 L 105 492" stroke="#f87171" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="115" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f87171">No</text>

  <!-- Exist Yes -->
  <path d="M 270 430 L 282 430 L 282 430 L 282 430" stroke="#34d399" stroke-width="2" fill="none"/>
  <path d="M 270 430 L 288 430" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="275" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#34d399">Yes</text>

  <!-- Expire check to Yes/No -->
  <!-- Expire Yes -->
  <path d="M 360 465 L 360 492" stroke="#f87171" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="370" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f87171">Yes</text>

  <!-- Expire No -->
  <path d="M 430 430 L 532 430" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="470" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#34d399">No</text>
</svg>
