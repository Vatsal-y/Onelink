<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <rect width="900" height="600" rx="15" fill="#0b0f19"/>
  <defs>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="yellow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">SnapLink — Serverless URL Shortener</text>
  <text x="450" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">High-Level System Architecture</text>

  <!-- Client Layer -->
  <g transform="translate(100, 120)">
    <rect width="320" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="15" y="15" width="40" height="40" rx="6" fill="url(#blue-grad)"/>
    <!-- Icon -->
    <path d="M 31 27 L 39 35 L 31 43 M 25 31 L 25 39" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="70" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">React SPA Dashboard</text>
    <text x="70" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8">Link Management &amp; Analytics UI</text>
  </g>

  <g transform="translate(480, 120)">
    <rect width="320" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="15" y="15" width="40" height="40" rx="6" fill="url(#blue-grad)"/>
    <!-- Icon -->
    <circle cx="35" cy="35" r="10" stroke="#fff" stroke-width="2" fill="none"/>
    <path d="M 35 25 L 35 35 L 42 35" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="70" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Short Link Clicks</text>
    <text x="70" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8">End Users / HTTP Clients</text>
  </g>

  <!-- API Gateway & Cognito -->
  <g transform="translate(100, 240)">
    <rect width="520" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="15" y="15" width="40" height="40" rx="6" fill="url(#yellow-grad)"/>
    <!-- Icon -->
    <path d="M 27 35 L 43 35 M 35 27 L 35 43 M 29 29 L 41 41" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="70" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">AWS API Gateway</text>
    <text x="70" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8">REST Endpoint Router &amp; CORS Handler</text>
  </g>

  <g transform="translate(660, 240)">
    <rect width="140" height="70" rx="8" fill="#1e293b" stroke="#451a03" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="15" y="15" width="40" height="40" rx="6" fill="url(#orange-grad)"/>
    <!-- Icon -->
    <rect x="28" y="28" width="14" height="14" rx="2" stroke="#fff" stroke-width="2" fill="none"/>
    <circle cx="35" cy="35" r="3" fill="#fff"/>
    <text x="65" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">AWS Cognito</text>
    <text x="65" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">JWT Verification</text>
  </g>

  <!-- Spring Boot Lambda -->
  <g transform="translate(100, 360)">
    <rect width="520" height="80" rx="8" fill="#1e293b" stroke="#065f46" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="15" y="20" width="40" height="40" rx="6" fill="url(#green-grad)"/>
    <!-- Icon -->
    <path d="M 35 26 L 43 35 L 35 44 L 27 35 Z" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="70" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Spring Boot API Service (AWS Lambda)</text>
    <text x="70" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#34d399">SnapStart (Java 17/21) • HTTP Web Adapter</text>
    <text x="70" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Resolves shortcodes, manages URLs, generates QR codes</text>
  </g>

  <g transform="translate(660, 360)">
    <rect width="140" height="80" rx="8" fill="#1e293b" stroke="#065f46" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="15" y="20" width="40" height="40" rx="6" fill="url(#green-grad)"/>
    <!-- Icon -->
    <path d="M 28 35 C 28 27 35 27 35 27 C 35 27 42 27 42 35 C 42 43 35 43 35 43" stroke="#fff" stroke-width="2" fill="none"/>
    <text x="65" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Click Listener</text>
    <text x="65" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34d399">SQS Consumer</text>
    <text x="65" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Async Analytics</text>
  </g>

  <!-- AWS Resources (Bottom Row) -->
  <!-- DynamoDB -->
  <g transform="translate(100, 490)">
    <rect width="150" height="70" rx="8" fill="#1e293b" stroke="#1e1b4b" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="12" y="15" width="40" height="40" rx="6" fill="url(#purple-grad)"/>
    <!-- Icon -->
    <ellipse cx="32" cy="27" rx="8" ry="3" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M 24 27 L 24 35 C 24 38 32 38 32 38 C 32 38 40 38 40 35 L 40 27" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M 24 35 L 24 43 C 24 46 32 46 32 46 C 32 46 40 46 40 43 L 40 35" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="60" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">DynamoDB</text>
    <text x="60" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">links &amp; analytics</text>
  </g>

  <!-- Redis Cache -->
  <g transform="translate(270, 490)">
    <rect width="140" height="70" rx="8" fill="#1e293b" stroke="#7f1d1d" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="12" y="15" width="40" height="40" rx="6" fill="#ef4444"/>
    <!-- Icon -->
    <path d="M 24 32 L 32 25 L 40 32 L 32 39 Z" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M 24 38 L 32 45 L 40 38" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="60" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">ElastiCache</text>
    <text x="60" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#f87171">Redis Cache-aside</text>
  </g>

  <!-- S3 Bucket -->
  <g transform="translate(430, 490)">
    <rect width="140" height="70" rx="8" fill="#1e293b" stroke="#0f766e" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="12" y="15" width="40" height="40" rx="6" fill="#0d9488"/>
    <!-- Icon -->
    <path d="M 25 25 L 39 25 L 37 43 L 27 43 Z" fill="none" stroke="#fff" stroke-width="2"/>
    <ellipse cx="32" cy="25" rx="7" ry="2" fill="#fff"/>
    <text x="60" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Amazon S3</text>
    <text x="60" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2dd4bf">QR Code Bucket</text>
  </g>

  <!-- SQS Queue -->
  <g transform="translate(590, 490)">
    <rect width="210" height="70" rx="8" fill="#1e293b" stroke="#c2410c" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="12" y="15" width="40" height="40" rx="6" fill="url(#orange-grad)"/>
    <!-- Icon -->
    <rect x="25" y="32" width="6" height="6" stroke="#fff" stroke-width="1.5" fill="none"/>
    <rect x="34" y="32" width="6" height="6" stroke="#fff" stroke-width="1.5" fill="none"/>
    <rect x="43" y="32" width="6" height="6" stroke="#fff" stroke-width="1.5" fill="none"/>
    <text x="60" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Amazon SQS</text>
    <text x="60" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">snaplink-click-events</text>
  </g>

  <!-- Connectors / Flow Lines -->
  <!-- SPA to API Gateway -->
  <path d="M 260 190 L 260 232" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="270" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">HTTP + JWT</text>

  <!-- Clicker to API Gateway -->
  <path d="M 640 190 L 400 232" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="540" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">GET /{code}</text>

  <!-- Gateway to Cognito -->
  <path d="M 620 275 L 652 275" stroke="#ea580c" stroke-width="2" stroke-dasharray="4" fill="none" marker-end="url(#arrow)"/>

  <!-- Gateway to Spring Boot Lambda -->
  <path d="M 360 310 L 360 352" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="370" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">HTTP Proxy</text>

  <!-- Lambda to DynamoDB -->
  <path d="M 175 440 L 175 482" stroke="#818cf8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Lambda to Redis -->
  <path d="M 340 440 L 340 482" stroke="#f87171" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Lambda to S3 -->
  <path d="M 500 440 L 500 482" stroke="#2dd4bf" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Lambda to SQS -->
  <path d="M 590 440 L 670 482" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- SQS to Click Event Consumer -->
  <path d="M 730 482 L 730 448" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- SQS Consumer to DynamoDB -->
  <path d="M 750 440 L 780 440 L 780 575 L 175 575 L 175 568" stroke="#34d399" stroke-width="1.5" stroke-dasharray="3" fill="none" marker-end="url(#arrow)"/>
  <text x="790" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#34d399" transform="rotate(90, 790, 475)">Write Analytics</text>
</svg>
