<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="15" fill="url(#bg-grad)"/>

  <!-- Glowing background elements -->
  <circle cx="200" cy="100" r="150" fill="#3b82f6" opacity="0.15" filter="url(#glow)"/>
  <circle cx="1000" cy="300" r="180" fill="#10b981" opacity="0.12" filter="url(#glow)"/>
  <circle cx="600" cy="200" r="200" fill="#6366f1" opacity="0.1" filter="url(#glow)"/>

  <!-- Logo Icon -->
  <g transform="translate(540, 60)" filter="url(#glow)">
    <circle cx="60" cy="60" r="50" fill="none" stroke="url(#text-grad)" stroke-width="4"/>
    <!-- Chain Links -->
    <rect x="35" y="45" width="50" height="30" rx="15" fill="none" stroke="#ffffff" stroke-width="5" transform="rotate(-45, 60, 60)"/>
    <rect x="35" y="45" width="50" height="30" rx="15" fill="none" stroke="url(#text-grad)" stroke-width="5" transform="rotate(45, 60, 60)"/>
  </g>

  <!-- Title Text -->
  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="url(#text-grad)" text-anchor="middle" letter-spacing="4" filter="url(#glow)">SNAPLINK</text>
  
  <!-- Subtitle -->
  <text x="600" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">Production-Grade Serverless URL Shortener</text>
  
  <!-- Badges / Stack info -->
  <text x="600" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle" letter-spacing="1">
    SPRING BOOT 3  •  AWS LAMBDA  •  DYNAMODB  •  REDIS CACHE  •  SQS  •  REACT
  </text>
</svg>
