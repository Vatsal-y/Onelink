<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <rect width="900" height="600" rx="15" fill="#0b0f19"/>
  <defs>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">SnapLink — Async Analytics Pipeline</text>
  <text x="450" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Decoupled Architecture via SQS Messaging</text>

  <!-- Step 1: User Redirect -->
  <g transform="translate(80, 150)">
    <rect width="220" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-10" y="-10" width="24" height="24" rx="12" fill="#3b82f6"/>
    <text x="2" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Link Click Redirected</text>
    <text x="20" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">User receives 301 instantly.</text>
    <text x="20" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Backend captures request metadata.</text>
  </g>

  <!-- Step 2: SQS Push -->
  <g transform="translate(340, 150)">
    <rect width="220" height="90" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-10" y="-10" width="24" height="24" rx="12" fill="#ea580c"/>
    <text x="2" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Enqueued to SQS</text>
    <text x="20" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ea993c">Queue: click-events</text>
    <text x="20" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Fast fire-and-forget push (&lt;5ms)</text>
  </g>

  <!-- SQS Queue Visual -->
  <g transform="translate(600, 140)">
    <rect width="220" height="110" rx="8" fill="#2d1910" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4" filter="url(#shadow)"/>
    <text x="110" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ff7e47" text-anchor="middle">AWS SQS Queue</text>
    <!-- Message 1 -->
    <rect x="20" y="45" width="50" height="30" rx="4" fill="#ea580c"/>
    <text x="45" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fff" text-anchor="middle">MSG</text>
    <!-- Message 2 -->
    <rect x="85" y="45" width="50" height="30" rx="4" fill="#ea580c" opacity="0.8"/>
    <text x="110" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fff" text-anchor="middle" opacity="0.8">MSG</text>
    <!-- Message 3 -->
    <rect x="150" y="45" width="50" height="30" rx="4" fill="#ea580c" opacity="0.6"/>
    <text x="175" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fff" text-anchor="middle" opacity="0.6">MSG</text>
    <text x="110" y="94" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">DLQ configured for retries</text>
  </g>

  <!-- Step 3: Consumer Polling -->
  <g transform="translate(600, 360)">
    <rect width="220" height="90" rx="8" fill="#1e293b" stroke="#047857" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-10" y="-10" width="24" height="24" rx="12" fill="#10b981"/>
    <text x="2" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">SQS Listener Polling</text>
    <text x="20" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#34d399">ClickEventConsumer</text>
    <text x="20" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Receives batches of messages</text>
  </g>

  <!-- Step 4: Enrich Event -->
  <g transform="translate(340, 360)">
    <rect width="220" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-10" y="-10" width="24" height="24" rx="12" fill="#3b82f6"/>
    <text x="2" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Enrich &amp; Geolocation</text>
    <text x="20" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Extract OS/Browser from UA.</text>
    <text x="20" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Resolve country from IP hash.</text>
  </g>

  <!-- Step 5: Save to Dynamo -->
  <g transform="translate(80, 360)">
    <rect width="220" height="90" rx="8" fill="#1e293b" stroke="#4f46e5" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-10" y="-10" width="24" height="24" rx="12" fill="#818cf8"/>
    <text x="2" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
    <text x="20" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Store in DynamoDB</text>
    <text x="20" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a5b4fc">Table: snaplink-analytics</text>
    <text x="20" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Key: shortCode#date</text>
  </g>

  <!-- Connectors -->
  <path d="M 300 195 L 332 195" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 560 195 L 592 195" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 710 250 L 710 352" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 600 405 L 568 405" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 340 405 L 308 405" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>
